# =====================================================================
# Decap CMS configuration for CHRSD
# Collections mirror src/content/config.ts exactly so editor output
# validates against the Astro content schemas.
# ---------------------------------------------------------------------
# BACKENDS:
#   - Production: git-gateway (Netlify Identity) — uncomment below.
#   - Local dev:  run `npx decap-server` then `npm run dev`, and keep
#     `local_backend: true`. Visit http://localhost:4321/admin/
# =====================================================================

backend:
  name: git-gateway
  branch: main

# Enables the local proxy backend during development (npx decap-server).
local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Editorial workflow adds Draft -> In Review -> Ready states (PR-based).
publish_mode: editorial_workflow

site_url: https://www.chrsd.org
display_url: https://www.chrsd.org
logo_url: /favicon.svg

collections:
  # ----------------------------------------------------------------- PROJECTS
  - name: "projects"
    label: "Programmes (Our Work)"
    label_singular: "Programme"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{focusArea}}"
    sortable_fields: ["order", "title", "startYear"]
    preview_path: "our-work/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text", hint: "One or two sentences shown on cards." }
      - label: "Focus area"
        name: "focusArea"
        widget: "select"
        options:
          - "Environmental Sustainability"
          - "Social Development"
          - "Climate Resilience"
          - "Human Rights"
          - "Research"
      - { label: "Country", name: "country", widget: "string", default: "Bangladesh" }
      - { label: "Cover image", name: "coverImage", widget: "image" }
      - { label: "Cover image alt text", name: "coverAlt", widget: "string", hint: "Describe the image for screen readers." }
      - label: "Image metadata (required for all photography)"
        name: "imageMeta"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Photographer", name: "photographer", widget: "string", required: false }
          - { label: "Location (District / Country)", name: "location", widget: "string", required: false }
          - { label: "Date", name: "date", widget: "datetime", required: false, date_format: "YYYY-MM-DD", time_format: false }
          - { label: "Programme name", name: "program", widget: "string", required: false }
          - label: "Subject consent status"
            name: "consentStatus"
            widget: "select"
            required: false
            options: ["obtained", "not-required", "pending"]
      - { label: "Start year", name: "startYear", widget: "number", required: false, value_type: "int" }
      - { label: "Status", name: "status", widget: "select", default: "active", options: ["active", "completed", "planned"] }
      - { label: "The challenge", name: "challenge", widget: "text", required: false }
      - { label: "Our approach", name: "approach", widget: "text", required: false }
      - label: "Key metrics"
        name: "metrics"
        widget: "list"
        required: false
        summary: "{{fields.value}} — {{fields.label}}"
        fields:
          - { label: "Value", name: "value", widget: "string", hint: "e.g. 12,400" }
          - { label: "Label", name: "label", widget: "string", hint: "e.g. saplings planted" }
      - { label: "Feature on homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Sort order", name: "order", widget: "number", default: 0, value_type: "int" }
      - { label: "Body (The evidence)", name: "body", widget: "markdown" }

  # --------------------------------------------------------------------- BLOG
  - name: "blog"
    label: "Blog"
    label_singular: "Blog post"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{pubDate}}"
    sortable_fields: ["pubDate", "title"]
    preview_path: "stay-informed/blog/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish date", name: "pubDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated date", name: "updatedDate", widget: "datetime", required: false, date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Author", name: "author", widget: "string", default: "CHRSD Editorial Team" }
      - { label: "Category", name: "category", widget: "string", default: "Field Notes" }
      - { label: "Cover image", name: "coverImage", widget: "image" }
      - { label: "Cover image alt text", name: "coverAlt", widget: "string" }
      - label: "Image metadata"
        name: "imageMeta"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Photographer", name: "photographer", widget: "string", required: false }
          - { label: "Location", name: "location", widget: "string", required: false }
          - { label: "Date", name: "date", widget: "datetime", required: false, date_format: "YYYY-MM-DD", time_format: false }
          - { label: "Programme", name: "program", widget: "string", required: false }
          - { label: "Consent status", name: "consentStatus", widget: "select", required: false, options: ["obtained", "not-required", "pending"] }
      - { label: "Tags", name: "tags", widget: "list", required: false, default: [] }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # --------------------------------------------------------------------- NEWS
  - name: "news"
    label: "News & Press"
    label_singular: "News item"
    folder: "src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{type}}"
    sortable_fields: ["pubDate", "title"]
    preview_path: "stay-informed/news/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Two-line teaser shown on the card." }
      - { label: "Publish date", name: "pubDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Type", name: "type", widget: "select", default: "News", options: ["News", "Press Release", "Announcement"] }
      - { label: "Cover image", name: "coverImage", widget: "image" }
      - { label: "Cover image alt text", name: "coverAlt", widget: "string" }
      - label: "Image metadata"
        name: "imageMeta"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Photographer", name: "photographer", widget: "string", required: false }
          - { label: "Location", name: "location", widget: "string", required: false }
          - { label: "Consent status", name: "consentStatus", widget: "select", required: false, options: ["obtained", "not-required", "pending"] }
      - { label: "External URL", name: "externalUrl", widget: "string", required: false, hint: "If the story lives off-site, link to it here." }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }
